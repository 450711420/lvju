    yard:"有带院民居，传统感不如建水/大理，但绿化极好",
    conv:3, score:7.3, rank:"⑮",
    color:"#795548",
    warn:null,
    note:"绿化最好、人最少、空气最清新的城市之一。普洱茶产地，随时可以去茶山。高铁约2.5小时到昆明。真正想静下来读书写作的人，这里比大理安静百倍。",
    links:[]
  }
];

const REGION_COLORS = {
  "大理州":"#2a9d8f","红河州":"#e63946","保山":"#e76f51",
  "曲靖":"#4361ee","玉溪":"#7209b7","昆明":"#009688","普洱":"#795548"
};

// ── Map ──
const map = L.map('map').setView([24.5, 101.5], 7);
// 高德地图瓦片（国内访问最快，微信内可用）
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains: '1234',
  attribution: '© 高德地图',
  maxZoom: 18
}).addTo(map);

const markers = {};

DATA.forEach(d => {
  const m = L.circleMarker([d.lat, d.lng], {
    radius: 14, fillColor: d.color, color: '#fff',
    weight: 2.5, opacity: 1, fillOpacity: .9
  }).addTo(map);

  m.bindPopup(`
    <div style="min-width:210px;font-family:-apple-system,'PingFang SC',sans-serif">
      <div class="popup-title">${d.rank} ${d.name}</div>
      <div class="popup-row">📍 ${d.region} &nbsp;·&nbsp; 海拔 ${d.alt}m</div>
      <div class="popup-row">🌡️ 夏季均温 ${d.temp}</div>
      <div class="popup-row">💰 带院月租 <span class="popup-price">${d.rent}</span></div>
      <div class="popup-row">🏡 ${d.yard.slice(0,30)}…</div>
      <div class="popup-row">⭐ 综合推荐 <span class="popup-score">${d.score}/10</span></div>
      ${d.warn ? `<div class="popup-row" style="color:#b45309">⚠️ ${d.warn}</div>` : ''}
    </div>
  `, {maxWidth: 280});

  // 点地图 → 高亮卡片
  m.on('click', () => {
    const card = document.getElementById('c' + d.id);
    if (!card) return;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('flash'));
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 1800);
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  markers[d.id] = m;
});

// ── Legend ──
const legEl = document.getElementById('legend');
Object.entries(REGION_COLORS).forEach(([r, c]) => {
  const count = DATA.filter(d => d.region === r).length;
  legEl.innerHTML += `
    <div class="leg-item">
      <div class="leg-dot" style="background:${c}"></div>
      ${r}（${count}个）
    </div>`;
});

// ── Cards ──
function rentClass(min) {
  if (min < 1000) return 'cheap';
  if (min < 2000) return 'mid';
  return 'pricey';
}

function renderCards(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const list = filter === '全部' ? DATA : DATA.filter(d => d.region === filter);

  list.forEach(d => {
    const stars = '★'.repeat(d.conv) + '☆'.repeat(5 - d.conv);
    const linksHtml = d.links.map(l =>
      `<a class="lnk ${l.p ? 'lnk-p' : 'lnk-s'}" href="${l.u}" target="_blank">${l.t}</a>`
    ).join('');
    const warnHtml = d.warn ? `<span class="warn-tag">⚠️ ${d.warn}</span>` : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'c' + d.id;
    card.dataset.region = d.region;
    card.innerHTML = `
      <div class="card-top" style="background:${d.color}">
        <div class="card-rank">${d.rank}</div>
        <div class="card-name">${d.name}</div>
        <div class="card-sub">${d.region} ${warnHtml}</div>
      </div>
      <div class="card-body">
        <div class="row"><span class="lbl">📐 海拔</span><span class="val">${d.alt} m</span></div>
        <div class="row"><span class="lbl">🌡️ 夏季均温</span><span class="val">${d.temp}</span></div>
        <div class="row"><span class="lbl">💰 带院月租</span><span class="val ${rentClass(d.rentMin)}">${d.rent}</span></div>
        <div class="row"><span class="lbl">🏡 院子类型</span><span class="val" style="text-align:right;max-width:65%">${d.yard}</span></div>
        <div class="row"><span class="lbl">🛒 生活便利</span><span class="stars">${stars}</span></div>
        <div class="row"><span class="lbl">⭐ 综合推荐</span><span class="score-pill">${d.score} / 10</span></div>
        <div class="note" style="border-color:${d.color}">${d.note}</div>
      </div>
      ${d.links.length ? `<div class="card-links">${linksHtml}</div>` : ''}
    `;

    // 点卡片 → 跳地图
    card.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      map.setView([d.lat, d.lng], 12, { animate: true });
      markers[d.id].openPopup();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    grid.appendChild(card);
  });
}

function doFilter(region, btn) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(region);
}

renderCards('全部');
</script>
</body>
</html>
